# Edge reverse proxy — nihongo.com.vn
# Behind OSH/CDN: origin is often pulled over HTTP. Do NOT force-redirect all :80
# traffic to HTTPS (that causes 301 loops + Origin-Health-Check failures).
# Docker DNS: re-resolve upstreams after container recreate.

resolver 127.0.0.11 valid=10s ipv6=off;

map $http_x_forwarded_proto $fwd_proto {
  default $http_x_forwarded_proto;
  ''      $scheme;
}

# Shared proxy headers via include-style duplication (keep simple).
# $client_upstream / $app_upstream set per-server.

server {
  listen 80;
  server_name nihongo.com.vn www.nihongo.com.vn;

  client_max_body_size 25m;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  set $client_upstream client:80;
  set $app_upstream app-server:4000;

  # Origin / CDN health + public via CDN TLS termination
  location / {
    proxy_pass http://$client_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
  }

  location /api/ {
    proxy_pass http://$app_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
    proxy_connect_timeout 5s;
    proxy_read_timeout 120s;
  }

  location /api-docs {
    proxy_pass http://$app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
  }

  location /ws/ {
    proxy_pass http://$app_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
    proxy_read_timeout 3600s;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name nihongo.com.vn www.nihongo.com.vn;

  ssl_certificate     /etc/letsencrypt/live/nihongo.com.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/nihongo.com.vn/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 25m;

  set $client_upstream client:80;
  set $app_upstream app-server:4000;

  location / {
    proxy_pass http://$client_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
  }

  location /api/ {
    proxy_pass http://$app_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
    proxy_connect_timeout 5s;
    proxy_read_timeout 120s;
  }

  location /api-docs {
    proxy_pass http://$app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
  }

  location /ws/ {
    proxy_pass http://$app_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $fwd_proto;
    proxy_read_timeout 3600s;
  }
}
