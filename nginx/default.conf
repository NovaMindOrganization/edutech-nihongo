# Edge reverse proxy — nihongo.com.vn (HTTP + HTTPS + ACME)
# Docker DNS: re-resolve upstreams so recreated containers don't leave nginx
# with a stale IP (502 Host unreachable / Connection refused).

resolver 127.0.0.11 valid=10s ipv6=off;

server {
  listen 80;
  server_name nihongo.com.vn www.nihongo.com.vn;

  client_max_body_size 25m;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name nihongo.com.vn www.nihongo.com.vn;

  ssl_certificate     /etc/letsencrypt/live/nihongo.com.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/nihongo.com.vn/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 25m;

  # variable proxy_pass forces re-resolve via Docker DNS
  set $client_upstream client:80;
  set $app_upstream app-server:4000;

  location / {
    proxy_pass http://$client_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://$app_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 120s;
  }

  location /api-docs {
    proxy_pass http://$app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws/ {
    proxy_pass http://$app_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
  }
}
