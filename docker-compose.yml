# EduTech Nihongo — VPS deploy (CPU, bind-mount source + hot reload)
#
#   cp .env.example .env && docker compose up -d --build
#
# Networks: edge (public) | app | data (internal)
# Host ports: nginx :80 | portainer 127.0.0.1:9443
#
# Source mounts: git pull on host → containers see new files.
# app-server/ai-server use --reload; client rebuilds dist on restart.

name: edutech-nihongo

x-app-server-env: &app-server-env
  NODE_ENV: production
  PORT: 4000
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-app}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?set JWT_ACCESS_SECRET}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?set JWT_REFRESH_SECRET}
  JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES:-15m}
  JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES:-7d}
  CORS_ORIGIN: ${CORS_ORIGIN:-https://${DOMAIN:-localhost}}
  APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://${DOMAIN:-localhost}}
  AI_SERVER_URL: http://ai-server:8000
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_FROM: ${SMTP_FROM:-}
  SEPAY_API_KEY: ${SEPAY_API_KEY:-}
  SEPAY_SECRET: ${SEPAY_SECRET:-}
  SEPAY_ACCOUNT_NUMBER: ${SEPAY_ACCOUNT_NUMBER:-}
  SEPAY_ACCOUNT_NAME: ${SEPAY_ACCOUNT_NAME:-}
  SEPAY_BANK_NAME: ${SEPAY_BANK_NAME:-Vietcombank}
  SEPAY_BANK_BIN: ${SEPAY_BANK_BIN:-970436}
  PAYMENT_CODE_PREFIX: ${PAYMENT_CODE_PREFIX:-NIHONGO}
  ORDER_EXPIRY_MINUTES: ${ORDER_EXPIRY_MINUTES:-30}

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [data]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [data]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks: [data]

  ai-server:
    build:
      context: ./server/ai-server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: AI Service
      DATABASE_URL: ${AI_DATABASE_URL:-sqlite:////app/data/local.db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      OCR_ENGINE: paddleocr
      OCR_USE_GPU: 'false'
      OCR_PP_OCR_MODEL: ${OCR_PP_OCR_MODEL:-mobile}
      OCR_PRELOAD: ${OCR_PRELOAD:-true}
      OCR_PREPROCESS: 'true'
      OCR_USE_VISION: ${OCR_USE_VISION:-true}
      OCR_REFINE: ${OCR_REFINE:-true}
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      STT_GEMINI_FALLBACK: ${STT_GEMINI_FALLBACK:-true}
      EDGE_TTS_VOICE: ${EDGE_TTS_VOICE:-ja-JP-NanamiNeural}
      PA_ENGINE: ${PA_ENGINE:-azure}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-eastasia}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: 'True'
    volumes:
      - ./server/ai-server/app:/app/app
      - ai_models:/root/.cache
      - ai_data:/app/data
    depends_on:
      redis:
        condition: service_started
    networks: [app, data]

  app-server:
    build:
      context: ./server/app-server
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      ai-server:
        condition: service_started
    environment:
      <<: *app-server-env
    volumes:
      - ./server/app-server:/app
      - app_server_nm:/app/node_modules
    networks: [app, data]

  app-worker:
    build:
      context: ./server/app-server
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      [
        'sh',
        '-c',
        'pnpm exec prisma generate && pnpm exec tsx watch worker.ts',
      ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      <<: *app-server-env
    volumes:
      - ./server/app-server:/app
      - app_server_nm:/app/node_modules
    networks: [app, data]

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-NihongoCoach}
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-NihongoCoach}
    volumes:
      - ./client:/app
      - client_nm:/app/node_modules
      # keep host dist optional; container writes nginx html
    networks: [app]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - client
      - app-server
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    networks: [edge, app]

  portainer:
    image: portainer/portainer-ce:2.21.5
    restart: unless-stopped
    command: -H unix:///var/run/docker.sock
    ports:
      - '127.0.0.1:${PORTAINER_PORT:-9443}:9443'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks: [edge]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  ai_models:
  ai_data:
  portainer_data:
  # Preserve image node_modules when bind-mounting source
  app_server_nm:
  client_nm:

networks:
  edge:
    driver: bridge
  app:
    driver: bridge
  data:
    driver: bridge
    internal: true
